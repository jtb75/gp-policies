name: Bootstrap - Create S3 Backend

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  bootstrap:
    name: Create S3 state bucket and DynamoDB lock table
    runs-on: ubuntu-latest

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Create S3 bucket
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          BUCKET="jtb75-terraform-state-${ACCOUNT_ID}"

          if aws s3api head-bucket --bucket "$BUCKET" 2>/dev/null; then
            echo "Bucket $BUCKET already exists"
          else
            aws s3api create-bucket --bucket "$BUCKET"
            echo "Created bucket $BUCKET"
          fi

          aws s3api put-bucket-versioning --bucket "$BUCKET" \
            --versioning-configuration Status=Enabled

          aws s3api put-bucket-encryption --bucket "$BUCKET" \
            --server-side-encryption-configuration '{
              "Rules": [{"ApplyServerSideEncryptionByDefault": {"SSEAlgorithm": "AES256"}}]
            }'

          aws s3api put-public-access-block --bucket "$BUCKET" \
            --public-access-block-configuration '{
              "BlockPublicAcls": true,
              "IgnorePublicAcls": true,
              "BlockPublicPolicy": true,
              "RestrictPublicBuckets": true
            }'

      - name: Create DynamoDB lock table
        run: |
          if aws dynamodb describe-table --table-name jtb75-terraform-locks 2>/dev/null; then
            echo "Table jtb75-terraform-locks already exists"
          else
            aws dynamodb create-table \
              --table-name jtb75-terraform-locks \
              --attribute-definitions AttributeName=LockID,AttributeType=S \
              --key-schema AttributeName=LockID,KeyType=HASH \
              --billing-mode PAY_PER_REQUEST
            echo "Created DynamoDB table jtb75-terraform-locks"
          fi

      - name: Summary
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          echo "### Bootstrap Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Resource | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| S3 Bucket | \`jtb75-terraform-state-${ACCOUNT_ID}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| DynamoDB Table | \`jtb75-terraform-locks\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Region | \`us-east-1\` |" >> $GITHUB_STEP_SUMMARY
